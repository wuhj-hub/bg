name: 全市场双维扫描

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: search files
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          KB = os.environ["IMA_KB_ID"]
          TARGET = "folder_7485264708529742"
          def call(body):
              cid = os.environ["IMA_OPENAPI_CLIENTID"]; key = os.environ["IMA_OPENAPI_APIKEY"]
              req = urllib.request.Request(
                  "https://ima.qq.com/openapi/wiki/v1/search_knowledge",
                  data=json.dumps(body).encode(),
                  headers={"ima-openapi-clientid": cid, "ima-openapi-apikey": key, "Content-Type": "application/json"},
                  method="POST")
              return json.loads(urllib.request.urlopen(req, timeout=20).read().decode())
          for q in ["验证", "全市场双维扫描"]:
              r = call({"query": q, "knowledge_base_id": KB})
              info = r.get("data", {}).get("info_list", [])
              print(f"QUERY {q} count={len(info)} code={r.get('code')}")
              for it in info:
                  pid = it.get("parent_folder_id")
                  name = it.get("file_name") or it.get("name")
                  mid = it.get("media_id")
                  tag = "MATCH_DUAL" if pid == TARGET else "NOT_DUAL"
                  print(f"  {tag} name={name} media={mid}")
          PY
