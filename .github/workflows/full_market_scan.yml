name: 全市场双维扫描

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: check secrets
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
          IMA_FOLDER_ID: ${{ secrets.IMA_FOLDER_ID }}
        run: |
          python3 - <<'PY'
          import os
          KB = os.environ["IMA_KB_ID"]
          FOLDER = os.environ["IMA_FOLDER_ID"]
          EXPECT_KB = "6kjd8jHpAyqf0xFVUo2xUWPaDAKapAWCw-Tki7V-aAs="
          EXPECT_FOLDER = "folder_7485264708529742"
          print("KB_MATCH", KB == EXPECT_KB)
          print("FOLDER_MATCH", FOLDER == EXPECT_FOLDER)
          print("KB_LEN", len(KB))
          print("FOLDER_LEN", len(FOLDER))
          PY
