name: 全市场双维扫描

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 列出完整结构
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          KB = os.environ["IMA_KB_ID"]
          def call(body):
              cid = os.environ["IMA_OPENAPI_CLIENTID"]; key = os.environ["IMA_OPENAPI_APIKEY"]
              req = urllib.request.Request(
                  "https://ima.qq.com/openapi/wiki/v1/get_knowledge_list",
                  data=json.dumps(body).encode(),
                  headers={"ima-openapi-clientid": cid, "ima-openapi-apikey": key, "Content-Type": "application/json"},
                  method="POST")
              return json.loads(urllib.request.urlopen(req, timeout=20).read().decode())
          r = call({"cursor": "", "limit": 50, "knowledge_base_id": KB})
          print("KB", KB)
          print("ROOT current_path:", json.dumps(r.get("data", {}).get("current_path", []), ensure_ascii=False))
          folders = r.get("data", {}).get("knowledge_list", [])
          print("ROOT folders:", len(folders))
          for it in folders:
              fid = it.get("media_id")
              name = it.get("file_name")
              rr = call({"cursor": "", "limit": 50, "knowledge_base_id": KB, "folder_id": fid})
              files = rr.get("data", {}).get("knowledge_list", [])
              print(f"FOLDER id={fid} name={name} code={rr.get('code')} files={len(files)}")
              for f in files:
                  print("   -", f.get("media_id"), f.get("file_name"))
          PY
