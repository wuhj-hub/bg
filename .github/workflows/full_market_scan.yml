name: probe_search

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: search-knowledge
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
          IMA_FOLDER_ID: ${{ secrets.IMA_FOLDER_ID }}
        run: |
          python3 - <<'PY'
          import os, sys, time, json, urllib.request
          KB = os.environ["IMA_KB_ID"]
          FOLDER = os.environ["IMA_FOLDER_ID"]
          CID = os.environ["IMA_OPENAPI_CLIENTID"]
          KEY = os.environ["IMA_OPENAPI_APIKEY"]
          print("EXPECT_KB", KB)
          print("EXPECT_FOLDER", FOLDER)
          def search(q):
              body = json.dumps({"query": q, "knowledge_base_id": KB}).encode()
              req = urllib.request.Request(
                  "https://ima.qq.com/openapi/wiki/v1/search_knowledge",
                  data=body,
                  headers={"ima-openapi-clientid": CID,
                           "ima-openapi-apikey": KEY,
                           "Content-Type": "application/json"},
                  method="POST")
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode())
          for q in ["全市场双维扫描", "验证", "对照", "盘前", "复盘", "2026"]:
              try:
                  res = search(q)
                  lst = res.get("info_list", []) or []
                  print("Q=%s CODE=%s CNT=%d" % (q, res.get("code"), len(lst)))
                  for it in lst:
                      pid = it.get("parent_folder_id")
                      print("  title=%s mid=%s type=%s parent=%s MATCH_FOLDER=%s" % (
                          it.get("title"), it.get("media_id"), it.get("media_type"),
                          pid, pid == FOLDER))
              except Exception as e:
                  print("Q=%s ERR %s" % (q, repr(e)[:160]))
              time.sleep(3)
          PY
