name: 全市场双维扫描

on:
  schedule:
    # 北京时间 15:30（UTC 7:30），交易日收盘后自动运行（留 30 分钟给当日 K 线/资金流数据归集）
    - cron: "30 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: full-market-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    # 全市场约 3000 只主板股，westock 调用较慢，给足超时（GitHub 免费额度约 2000 分钟/月，
    # 若额度不足请改用 workflow_dispatch 手动触发，或在 Secrets 中调高 SCAN_WORKERS 缩短时长）
    timeout-minutes: 355
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js（westock npx 依赖）
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 生成沪深主板清单
        run: python3 gen_mainboard.py

      - name: 全市场双维扫描
        env:
          SCAN_WORKERS: "8"
        run: python3 full_market_dualdim.py all_mainboard.csv

      - name: 上传报告到 ima 知识库
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
          IMA_FOLDER_ID: ${{ secrets.IMA_FOLDER_ID }}
        run: python3 upload_ima.py --file full_market_report.md --name "全市场双维扫描_$(date +%Y-%m-%d).md"

      - name: 推送报告到微信
        if: success()
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
          PUSH_SERVICE: pushplus
        run: python3 push_report.py
