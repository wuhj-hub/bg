name: 全量扫描（复盘报告数据源）

on:
  schedule:
    # 北京时间 15:30（UTC 7:30），交易日收盘后自动运行
    - cron: "30 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: panhou-lianghua
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js（westock npx 依赖）
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 Python 依赖（pandas+numpy for 猛兽）
        run: |
          pip install pandas numpy

      # ─── 第一步：生成主板清单 ───
      - name: 生成沪深主板清单
        run: python3 gen_mainboard.py

      # ─── 第二步：全量量化扫描 ───
      - name: 全量量化扫描（盘后量化）
        env:
          SCAN_WORKERS: "8"
        run: python3 full_market_dualdim.py all_mainboard.csv

      # ─── 第二步.5：动态生成鱼身股票池 ───
      - name: 动态生成鱼身股票池（近20日日均成交额排名前300）
        run: python3 quant_scripts/gen_fish_pool.py

      # ─── 第三步：三系统预运行 ───
      - name: 量化系统预运行（双弦+鱼身+猛兽）
        run: python3 quant_scripts/run_all_quant.py

      # ─── 第四步：上传所有结果（失败不阻断，记录状态供推送）───
      - name: 上传盘后量化数据到复盘报告文件夹
        id: upload_main
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
          IMA_FOLDER_ID: folder_7485234585034
        run: |
          if python3 upload_ima.py --file panhou_lianghua.md --name "盘后量化_$(date +%Y-%m-%d).md"; then
            echo "IMA_UPLOAD_OK=true" >> "$GITHUB_ENV"
          else
            echo "IMA_UPLOAD_OK=false" >> "$GITHUB_ENV"
            echo "::warning::ima upload_main failed (OpenAPI 凭证可能过期/失效)"
          fi

      - name: 上传量化预运行结果到复盘报告文件夹
        id: upload_extra
        continue-on-error: true
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
          IMA_FOLDER_ID: folder_7485234585034
        run: |
          python3 upload_ima.py --file outputs/quant_results_$(date +%Y-%m-%d).json --name "quant_results_$(date +%Y-%m-%d).json"

      # ─── 第五步：推送结果到微信（PushPlus 独立备份通道，不依赖 ima 成功）───
      - name: 推送扫描结果到微信（PushPlus 备份通道）
        if: always()
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
          PUSH_SERVICE: pushplus
          IMA_UPLOAD_OK: ${{ env.IMA_UPLOAD_OK }}
        run: python3 push_notify.py
