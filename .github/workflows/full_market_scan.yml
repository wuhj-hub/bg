name: 全量扫描（复盘报告数据源）

on:
  schedule:
    # 北京时间 15:30（UTC 7:30），交易日收盘后自动运行
    - cron: "30 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: panhou-lianghua
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js（westock npx 依赖）
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 生成沪深主板清单
        run: python3 gen_mainboard.py

      - name: 全量量化扫描（复盘报告数据源）
        env:
          SCAN_WORKERS: "8"
        run: python3 full_market_dualdim.py all_mainboard.csv

      - name: 上传原始数据到复盘报告文件夹
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
          IMA_FOLDER_ID: folder_7485234585035034
        run: python3 upload_ima.py --file panhou_lianghua.md --name "盘后量化_$(date +%Y-%m-%d).md"

      - name: 推送扫描完成通知到微信
        if: success()
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
          PUSH_SERVICE: pushplus
        run: python3 push_notify.py
