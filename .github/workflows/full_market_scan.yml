name: 全市场双维扫描

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: upload + move to folder
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
          IMA_FOLDER_ID: ${{ secrets.IMA_FOLDER_ID }}
        run: |
          python3 - <<'PY'
          import os, sys, time
          sys.path.insert(0, ".")
          import upload_ima as U
          KB = os.environ["IMA_KB_ID"]
          FOLDER = os.environ["IMA_FOLDER_ID"]
          fn = "对照实验_moved_%s.md" % time.strftime("%H%M%S")
          open("/tmp/m.md", "w").write("# 对照实验 move\n上传并 move 到子文件夹。\n")
          mid, cred = U.create_media(KB, fn, os.path.getsize("/tmp/m.md"), 7, "text/markdown", "md")
          U.cos_upload(cred, "/tmp/m.md", "text/markdown")
          print("UPLOADED", mid, "NAME", fn)
          r = U.move_to_folder(KB, mid, FOLDER)
          print("MOVE_CODE", r.get("code"), "MOVE_MSG", r.get("msg"))
          PY
