name: 验证上传文件夹
on:
  workflow_dispatch:
  schedule:
    - cron: "45 13 * * *"
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: echo "# 验证文件 $(date)" > verify_tmp.md
      - name: 上传到 IMA_FOLDER_ID
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
          IMA_FOLDER_ID: ${{ secrets.IMA_FOLDER_ID }}
        run: python3 upload_ima.py --file verify_tmp.md --name "验证_$(date +%s).md"
      - name: 列出目标文件夹内容
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          KB = os.environ["IMA_KB_ID"]
          FID = "folder_7485264708529742"
          cid = os.environ["IMA_OPENAPI_CLIENTID"]; key = os.environ["IMA_OPENAPI_APIKEY"]
          req = urllib.request.Request(
              "https://ima.qq.com/openapi/wiki/v1/get_knowledge_list",
              data=json.dumps({"cursor": "", "limit": 50, "knowledge_base_id": KB, "folder_id": FID}).encode(),
              headers={"ima-openapi-clientid": cid, "ima-openapi-apikey": key, "Content-Type": "application/json"},
              method="POST")
          r = json.loads(urllib.request.urlopen(req, timeout=20).read().decode())
          print("FOLDER", FID, "code", r.get("code"))
          for it in r.get("data", {}).get("knowledge_list", []):
              print("  -", it.get("media_id"), it.get("file_name"))
          PY
